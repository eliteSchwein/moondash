name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-amd64:
    name: Build release Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            clang \
            mold

      - name: Build Tauri app (amd64)
        run: npm run tauri build

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1)"
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found"
            exit 1
          fi

          cp "$DEB_FILE" "release-assets/mooncord-linux-amd64.deb"

          if [ -f "src-tauri/target/release/mooncord" ]; then
            cp "src-tauri/target/release/mooncord" "release-assets/mooncord-linux-amd64"
            chmod +x "release-assets/mooncord-linux-amd64"
          else
            echo "No executable found at src-tauri/target/release/mooncord"
            exit 1
          fi

      - name: Upload amd64 release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-amd64
          path: release-assets/*
          if-no-files-found: error

  build-arm64:
    name: Build release Linux arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            clang \
            mold

      - name: Build Tauri app (arm64)
        run: npm run tauri build

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1)"
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found"
            exit 1
          fi

          cp "$DEB_FILE" "release-assets/mooncord-linux-arm64.deb"

          if [ -f "src-tauri/target/release/mooncord" ]; then
            cp "src-tauri/target/release/mooncord" "release-assets/mooncord-linux-arm64"
            chmod +x "release-assets/mooncord-linux-arm64"
          else
            echo "No executable found at src-tauri/target/release/mooncord"
            exit 1
          fi

      - name: Upload arm64 release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-arm64
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64

    steps:
      - name: Download amd64 assets
        uses: actions/download-artifact@v4
        with:
          name: release-amd64
          path: release-assets

      - name: Download arm64 assets
        uses: actions/download-artifact@v4
        with:
          name: release-arm64
          path: release-assets

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/mooncord-linux-amd64.deb
            release-assets/mooncord-linux-amd64
            release-assets/mooncord-linux-arm64.deb
            release-assets/mooncord-linux-arm64