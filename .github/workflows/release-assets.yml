name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    name: Build release Linux ${{ matrix.arch }} Debian ${{ matrix.debian }}
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debian: "12"
          - arch: amd64
            runner: ubuntu-latest
            debian: "13"
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "12"
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "13"

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            git \
            xz-utils \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            clang \
            mold \
            binutils

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found"
            exit 1
          fi

          cp "$DEB_FILE" "release-assets/mooncord-linux-${{ matrix.arch }}-debian${{ matrix.debian }}.deb"

          if [ -f "src-tauri/target/release/mooncord" ]; then
            cp "src-tauri/target/release/mooncord" "release-assets/mooncord-linux-${{ matrix.arch }}-debian${{ matrix.debian }}"
            chmod +x "release-assets/mooncord-linux-${{ matrix.arch }}-debian${{ matrix.debian }}"
          else
            echo "No executable found at src-tauri/target/release/mooncord"
            exit 1
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}-debian${{ matrix.debian }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/mooncord-linux-amd64-debian12.deb
            release-assets/mooncord-linux-amd64-debian12
            release-assets/mooncord-linux-amd64-debian13.deb
            release-assets/mooncord-linux-amd64-debian13
            release-assets/mooncord-linux-arm64-debian12.deb
            release-assets/mooncord-linux-arm64-debian12
            release-assets/mooncord-linux-arm64-debian13.deb
            release-assets/mooncord-linux-arm64-debian13