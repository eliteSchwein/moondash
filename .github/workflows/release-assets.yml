name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  frontend-build:
    name: Build frontend
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build --if-present

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            dist
            build
          if-no-files-found: error

  build-release-native:
    name: Build release Linux ${{ matrix.arch }} ${{ matrix.osname }}
    needs: frontend-build
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: [self-hosted, linux, x64]
            debian: "12"
            osname: bookworm

          - arch: amd64
            runner: [self-hosted, linux, x64]
            debian: "13"
            osname: trixie

          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "12"
            osname: bookworm

          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "13"
            osname: trixie

    steps:
      - name: Install native build tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev clang mold binutils file

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: |
          CORES="$(nproc)"
          JOBS="$((CORES > 1 ? CORES - 1 : 1))"

          export CARGO_BUILD_JOBS="$JOBS"
          export MAKEFLAGS="-j$JOBS"

          echo "Using $JOBS build jobs out of $CORES cores"

          npm run tauri build

      - name: Prepare release assets
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"

          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found"
            find src-tauri/target -maxdepth 5 -type f | sort || true
            exit 1
          fi

          cp "$DEB_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}.deb"

          BIN_FILE="src-tauri/target/release/moondash"

          if [ -f "$BIN_FILE" ]; then
            cp "$BIN_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            chmod +x "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            file "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}" || true
            objdump -T "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}" | grep GLIBC_ | sort -Vu | tail -n 30 || true
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-moondash-${{ matrix.osname }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  build-release-armhf:
    name: Build release Linux armhf ${{ matrix.osname }}
    needs: frontend-build
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        include:
          - debian: "12"
            osname: bookworm

          - debian: "13"
            osname: trixie

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Test armhf container support
        run: |
          docker run --rm --platform linux/arm/v7 arm32v7/debian:${{ matrix.debian }} \
            bash -lc 'dpkg --print-architecture && uname -m'

      - name: Build release armhf in Debian ${{ matrix.debian }}
        run: |
          CORES="$(nproc)"
          JOBS="$((CORES > 1 ? CORES - 1 : 1))"

          echo "Host cores: $CORES"
          echo "Using jobs: $JOBS"

          docker run --rm \
            --platform linux/arm/v7 \
            -e CARGO_BUILD_JOBS="$JOBS" \
            -e MAKEFLAGS="-j$JOBS" \
            -v "$PWD:/work" \
            -w /work \
            arm32v7/debian:${{ matrix.debian }} \
            bash -lc '
              set -euo pipefail

              CORES="$(nproc)"
              JOBS="${CARGO_BUILD_JOBS:-$CORES}"

              export CARGO_BUILD_JOBS="$JOBS"
              export MAKEFLAGS="-j$JOBS"

              echo "Container cores: $CORES"
              echo "Using build jobs: $JOBS"

              apt-get update
              apt-get install -y \
                ca-certificates curl git xz-utils build-essential \
                pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
                libayatana-appindicator3-dev librsvg2-dev patchelf \
                libssl-dev clang mold binutils file gnupg

              mkdir -p /etc/apt/keyrings
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
                | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg

              echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" \
                > /etc/apt/sources.list.d/nodesource.list

              apt-get update
              apt-get install -y nodejs

              node --version
              npm --version

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain stable

              . "$HOME/.cargo/env"

              rustc --version
              cargo --version

              npm ci
              rustup target add armv7-unknown-linux-gnueabihf
              npm run tauri build -- --target armv7-unknown-linux-gnueabihf

              VERSION="$(node -p "require(\"./package.json\").version")"
              mkdir -p release-assets

              DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"

              if [ -z "$DEB_FILE" ]; then
                echo "No .deb file found"
                find src-tauri/target -maxdepth 5 -type f | sort || true
                exit 1
              fi

              cp "$DEB_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_armhf.deb"

              BIN_FILE="src-tauri/target/release/moondash"

              if [ -f "$BIN_FILE" ]; then
                cp "$BIN_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_armhf"
                chmod +x "release-assets/moondash_${VERSION}.${{ matrix.osname }}_armhf"
                file "release-assets/moondash_${VERSION}.${{ matrix.osname }}_armhf" || true
                objdump -T "release-assets/moondash_${VERSION}.${{ matrix.osname }}_armhf" | grep GLIBC_ | sort -Vu | tail -n 30 || true
              fi
            '

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-moondash-${{ matrix.osname }}-armhf
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs:
      - build-release-native
      - build-release-armhf

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.deb
            release-assets/moondash_*_amd64
            release-assets/moondash_*_arm64
            release-assets/moondash_*_armhf