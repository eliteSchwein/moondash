name: Build

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    container: debian:12

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            git \
            xz-utils \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            clang \
            mold

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend audit
        run: npm audit --audit-level=high

      - name: Frontend build
        run: npm run build --if-present

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust audit
        working-directory: src-tauri
        run: cargo audit || true

      - name: Rust build check
        working-directory: src-tauri
        run: cargo check --all-targets

  build-linux:
    name: Build Linux ${{ matrix.arch }} Debian ${{ matrix.debian }}
    needs: audit
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debian: "12"
          - arch: amd64
            runner: ubuntu-latest
            debian: "13"
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "12"
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "13"

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            git \
            xz-utils \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            clang \
            mold \
            binutils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: npm run tauri build

      - name: Verify GLIBC requirement
        run: |
          ldd --version
          if [ -f "src-tauri/target/release/mooncord" ]; then
            objdump -T src-tauri/target/release/mooncord | grep GLIBC_ | sort -Vu | tail -n 30 || true
          fi

      - name: Collect artifacts
        run: |
          mkdir -p "dist-artifacts/linux-${{ matrix.arch }}-debian${{ matrix.debian }}"

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"
          if [ -n "$DEB_FILE" ]; then
            cp -v "$DEB_FILE" "dist-artifacts/linux-${{ matrix.arch }}-debian${{ matrix.debian }}/mooncord-linux-${{ matrix.arch }}-debian${{ matrix.debian }}.deb"
          fi

          if [ -f "src-tauri/target/release/mooncord" ]; then
            cp -v "src-tauri/target/release/mooncord" "dist-artifacts/linux-${{ matrix.arch }}-debian${{ matrix.debian }}/mooncord-linux-${{ matrix.arch }}-debian${{ matrix.debian }}"
            chmod +x "dist-artifacts/linux-${{ matrix.arch }}-debian${{ matrix.debian }}/mooncord-linux-${{ matrix.arch }}-debian${{ matrix.debian }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-debian${{ matrix.debian }}-artifacts
          path: dist-artifacts/linux-${{ matrix.arch }}-debian${{ matrix.debian }}
          if-no-files-found: error