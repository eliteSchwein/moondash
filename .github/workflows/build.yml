name: Build

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  build-amd64:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri app (amd64)
        run: npm run tauri build

      - name: Collect amd64 artifacts
        run: |
          mkdir -p dist-artifacts/amd64
          find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -perm -111 \) -exec cp -v {} dist-artifacts/amd64/ \; || true
          if [ -f "src-tauri/target/release/mooncord" ]; then
            cp -v src-tauri/target/release/mooncord dist-artifacts/amd64/
          fi

      - name: Upload amd64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-artifacts
          path: dist-artifacts/amd64
          if-no-files-found: error

  build-arm64:
    name: Build Linux arm64
    runs-on: [self-hosted, linux, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri app (arm64)
        run: npm run tauri build

      - name: Collect arm64 artifacts
        run: |
          mkdir -p dist-artifacts/arm64
          find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -perm -111 \) -exec cp -v {} dist-artifacts/arm64/ \; || true
          if [ -f "src-tauri/target/release/mooncord" ]; then
            cp -v src-tauri/target/release/mooncord dist-artifacts/arm64/
          fi

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: dist-artifacts/arm64
          if-no-files-found: error